{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Password Reset Successful - AULAF</title>
    <link rel="stylesheet" href="{% static 'items/in.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body class="login-body">
    <div class="login-card">
        <div class="login-logo-wrapper">
            <img src="{% static 'items/au_logo.jpeg' %}" alt="AU Logo" class="login-logo">
        </div>
        <h1 class="login-heading">AULAF</h1>
        <p class="login-subheading">Password Reset Successful</p>
        <p style="text-align:center; margin: 20px 0; color: #555;">
            Your password has been updated. You can now log in with your new password.
        </p>
        <p class="register-login-link">
            <a href="/" class="login-btn" style="display:inline-block; text-decoration:none;">Go to Login</a>
        </p>
    </div>
</body>
</html>
