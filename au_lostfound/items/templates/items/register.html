{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register - AULAF | Ahmedabad University Lost & Found</title>
    <link rel="stylesheet" href="{% static 'items/in.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        /* Position the translate bar in top-right corner */
        #google_translate_element {
            position: fixed;
            top: 12px;
            right: 16px;
            z-index: 99999;
            background: #fff;
            border-radius: 8px;
            padding: 4px 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        
        /* Hide Google's branding bar at top of page */
        .goog-te-banner-frame,
        #goog-gt-tt,
        .goog-te-balloon-frame {
            display: none !important;
        }
        
        body {
            top: 0 !important;  /* prevent Google pushing page down */
        }
        
        .goog-te-gadget {
            font-family: 'Montserrat', Arial, sans-serif !important;
            font-size: 13px !important;
            color: #7B1C1C !important;
        }
        
        .goog-te-gadget select {
            border: 1px solid #c9a0a0;
            border-radius: 6px;
            padding: 4px 8px;
            font-size: 13px;
            color: #7B1C1C;
            font-family: 'Montserrat', Arial, sans-serif;
            outline: none;
            cursor: pointer;
        }
    </style>
</head>

<body class="register-body">

    <div class="login-card">

        <!-- Logo -->
        <div class="login-logo-wrapper">
            <img src="{% static 'items/au_logo.jpeg' %}" alt="Ahmedabad University Logo" class="login-logo">
        </div>

        <!-- Title -->
        <h1 class="login-heading">AULAF</h1>
        <p class="login-subheading">Create Your Account</p>

        <!-- Form -->
        <form method="POST" class="login-form register-form">
            {% csrf_token %}
            {% for field in form %}
                <div class="login-field">
                    <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}
                        <span class="field-error">{{ field.errors|join:", " }}</span>
                    {% endif %}
                </div>
            {% endfor %}

            <button type="submit" class="login-btn">Register</button>
        </form>

        <p class="register-login-link">
            Already have an account? <a href="{% url 'login' %}">Sign In</a>
        </p>

    </div>
    <div id="google_translate_element"></div>
 
<script type="text/javascript">
  function googleTranslateElementInit() {
    new google.translate.TranslateElement({
      pageLanguage: 'en',
      includedLanguages: 'en,hi,gu,mr,ta,te,kn,ml,pa,bn,or,as,ur,ne,si,kok,mai,mni,sat,doi,ks',
      layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
      autoDisplay: false,
    }, 'google_translate_element');
  }
</script>
<script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

</body>
</html>
