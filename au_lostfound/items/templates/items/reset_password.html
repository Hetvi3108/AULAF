{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Set New Password - AULAF</title>
    <link rel="stylesheet" href="{% static 'items/in.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body class="login-body">
    <div class="login-card">
        <div class="login-logo-wrapper">
            <img src="{% static 'items/au_logo.jpeg' %}" alt="AU Logo" class="login-logo">
        </div>
        <h1 class="login-heading">AULAF</h1>
        <p class="login-subheading">Set New Password</p>

        {% if error %}
            <p style="color:red; text-align:center;">{{ error }}</p>
        {% endif %}

        {% if not error or 'match' in error or 'characters' in error %}
        <form method="POST" class="login-form">
            {% csrf_token %}
            <input type="hidden" name="uidb64" value="{{ uidb64 }}">
            <input type="hidden" name="token"  value="{{ token }}">

            <div class="login-field">
                <label>New Password</label>
                <input type="password" name="password1" placeholder="At least 8 characters" required>
            </div>
            <div class="login-field">
                <label>Confirm New Password</label>
                <input type="password" name="password2" placeholder="Repeat password" required>
            </div>

            <button class="login-btn">Set Password</button>
        </form>
        {% endif %}

        <p class="register-login-link">
            <a href="/">Back to Login</a>
        </p>
    </div>
</body>
</html>
