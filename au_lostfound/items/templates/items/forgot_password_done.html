{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Check Your Email - AULAF</title>
    <link rel="stylesheet" href="{% static 'items/in.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body class="login-body">
    <div class="login-card">
        <div class="login-logo-wrapper">
            <img src="{% static 'items/au_logo.jpeg' %}" alt="AU Logo" class="login-logo">
        </div>
        <h1 class="login-heading">AULAF</h1>
        <p class="login-subheading">Check Your Email</p>
        <p style="text-align:center; margin: 20px 0; color: #555;">
            If your email is registered, a password reset link has been sent to your <strong>@ahduni.edu.in</strong> inbox. Please check your email.
        </p>
        <p class="register-login-link">
            <a href="/">Back to Login</a>
        </p>
    </div>
</body>
</html>
